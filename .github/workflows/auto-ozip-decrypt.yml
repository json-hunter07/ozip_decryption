name: OZIP Decrypter (Fixed)

on:
  push:
    branches:
      - main

env:
  FIRMWARE_LINK: "https://download.c.realme.com/flash/Rollbackpack/realme_narzo%2020/RMX2191_11_OTA_0190_all_nksxIPHHdisT.ozip"
  FIRMWARE_NAME: "RMX2191_11_OTA_0190_all_nksxIPHHdisT.ozip"
  FINAL_ZIP_NAME: "decrypted_firmware.zip"
  TZ: Asia/Kolkata

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y aria2 python3 python3-pip zip wget

      - name: Download OZIP
        run: |
          aria2c -x 16 -s 16 "$FIRMWARE_LINK"

      - name: Install Python libs
        run: |
          pip3 install --upgrade pip
          pip3 install pycryptodome docopt

      - name: Decrypt OZIP
        run: |
          wget https://raw.githubusercontent.com/techyminati/oppo_ozip_decrypt/master/ozipdecrypt.py
          python3 ozipdecrypt.py "$FIRMWARE_NAME"

      - name: Extract decrypted zip
        run: |
          unzip -o *.zip -d out || true

      - name: Repack (optional)
        run: |
          cd out || exit 0
          zip -r "../$FINAL_ZIP_NAME" . || true

      - name: Upload artifact (clean way)
        uses: actions/upload-artifact@v4
        with:
          name: decrypted-output
          path: |
            *.zip
            out/
